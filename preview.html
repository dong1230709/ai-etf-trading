<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3366ff">
  <title>AI ETF交易系统 - 预览</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(180deg, #0a0e17 0%, #0d1117 100%); color: white; }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; min-height: 100vh; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .logo { width: 48px; height: 48px; background: linear-gradient(135deg, #3366ff, #00d68f); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    h1 { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 14px; color: #8f9bb3; margin-top: 4px; }
    .card { background: #1a2332; border: 1px solid #2e3a52; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .card-title { font-size: 14px; color: #8f9bb3; margin-bottom: 8px; }
    .price { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .price-up { color: #00d68f; }
    .price-down { color: #ff3d71; }
    .change { font-size: 16px; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat { background: #111827; border-radius: 12px; padding: 12px; }
    .stat-label { font-size: 12px; color: #5a6178; }
    .stat-value { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; margin-top: 16px; }
    .btn-primary { background: linear-gradient(135deg, #3366ff, #00d68f); color: white; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
    .tab { padding: 8px 16px; border-radius: 8px; background: #111827; color: #8f9bb3; font-size: 14px; white-space: nowrap; border: none; }
    .tab.active { background: #3366ff; color: white; }
    .ai-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(51, 102, 255, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #3366ff; }
    .progress { height: 8px; background: #111827; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #3366ff, #00d68f); border-radius: 4px; transition: width 0.3s; }
    .notice { background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.3); border-radius: 12px; padding: 12px; margin-top: 16px; }
    .notice-title { color: #ffc107; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .notice-text { color: #8f9bb3; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📈</div>
      <div>
        <h1>AI ETF交易系统</h1>
        <p class="subtitle">专业级量化交易终端</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">沪深300ETF (510300)</div>
      <div class="price price-up">¥4.256</div>
      <div class="change price-up">+0.086 (+2.06%)</div>
      <div class="ai-badge">🤖 AI实时分析中</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="this.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">📊 概览</button>
      <button class="tab" onclick="this.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">🎯 网格</button>
      <button class="tab" onclick="this.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">🤖 AI</button>
      <button class="tab" onclick="this.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">⚠️ 风险</button>
      <button class="tab" onclick="this.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">⚙️ 设置</button>
    </div>

    <div class="card">
      <div class="card-title">市场指数</div>
      <div class="grid">
        <div class="stat">
          <div class="stat-label">上证指数</div>
          <div class="stat-value price-up">3285.67</div>
        </div>
        <div class="stat">
          <div class="stat-label">深证成指</div>
          <div class="stat-value price-up">10856.23</div>
        </div>
        <div class="stat">
          <div class="stat-label">创业板</div>
          <div class="stat-value price-down">2156.34</div>
        </div>
        <div class="stat">
          <div class="stat-label">沪深300</div>
          <div class="stat-value price-up">4256.18</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">AI评分</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:14px;color:#8f9bb3;">综合评分</span>
        <span style="font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#00d68f;">78</span>
      </div>
      <div class="progress">
        <div class="progress-bar" style="width:78%"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;font-size:12px;color:#8f9bb3;">
        <div>趋势 72</div>
        <div>波动率 65</div>
        <div>动量 80</div>
        <div>风险 45</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">市场状态</div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:#111827;border-radius:12px;">
        <span style="font-size:24px;">📈</span>
        <div>
          <div style="font-weight:600;">趋势上涨</div>
          <div style="font-size:12px;color:#8f9bb3;">置信度 85%</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">网格交易建议</div>
      <div class="grid">
        <div class="stat">
          <div class="stat-label">网格数</div>
          <div class="stat-value">10格</div>
        </div>
        <div class="stat">
          <div class="stat-label">间距</div>
          <div class="stat-value">1.5%</div>
        </div>
        <div class="stat">
          <div class="stat-label">上沿</div>
          <div class="stat-value">4.58</div>
        </div>
        <div class="stat">
          <div class="stat-label">下沿</div>
          <div class="stat-value">3.93</div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="alert('请下载完整项目代码运行完整版本')">
      🔧 查看完整功能
    </button>

    <div class="notice">
      <div class="notice-title">⚠️ 注意事项</div>
      <div class="notice-text">
        这是静态预览页面，仅展示UI效果。<br>
        完整功能需要运行项目：<br>
        1. npm install<br>
        2. npm run dev
      </div>
    </div>
  </div>
</body>
</html>
