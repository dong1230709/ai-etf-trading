<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>极简测试</title>
</head>
<body style="padding:20px; font-family:sans-serif;">
    <h1>🎯 极简交互测试</h1>
    
    <h2>1. 按钮测试</h2>
    <button id="btn1" style="padding:15px; font-size:16px;">点击我 - 按钮1</button><br><br>
    <button id="btn2" style="padding:15px; font-size:16px;">点击我 - 按钮2</button><br><br>
    <button id="btn3" style="padding:15px; font-size:16px;">新建策略</button><br><br>
    
    <h2>2. 输入框测试</h2>
    <input type="text" id="input1" placeholder="输入文字" style="padding:10px; font-size:16px;"><br><br>
    <input type="number" id="input2" placeholder="输入数字" style="padding:10px; font-size:16px;"><br><br>
    
    <h2>3. 结果显示</h2>
    <div id="result" style="background:#eee; padding:10px; margin-top:20px;">等待操作...</div>
    
    <script>
        console.log('✅ 页面加载完成');
        
        var btn1 = document.getElementById('btn1');
        var btn2 = document.getElementById('btn2');
        var btn3 = document.getElementById('btn3');
        var input1 = document.getElementById('input1');
        var input2 = document.getElementById('input2');
        var result = document.getElementById('result');
        
        btn1.onclick = function(e) {
            console.log('btn1点击');
            result.innerHTML = '✓ 按钮1被点击了！时间：' + new Date().toLocaleTimeString();
        };
        
        btn2.onclick = function(e) {
            console.log('btn2点击');
            result.innerHTML = '✓ 按钮2被点击了！时间：' + new Date().toLocaleTimeString();
        };
        
        btn3.onclick = function(e) {
            console.log('btn3点击');
            result.innerHTML = '✓ 新建策略被点击了！时间：' + new Date().toLocaleTimeString();
        };
        
        input1.oninput = function() {
            console.log('input1输入:', this.value);
            result.innerHTML = '✓ 输入框1内容：' + this.value;
        };
        
        input2.oninput = function() {
            console.log('input2输入:', this.value);
            result.innerHTML = '✓ 输入框2内容：' + this.value;
        };
        
        document.onclick = function(e) {
            console.log('全局点击:', e.target);
        };
        
        console.log('✅ 事件绑定完成');
    </script>
</body>
</html>
